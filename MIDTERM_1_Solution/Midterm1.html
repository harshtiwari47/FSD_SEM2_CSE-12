<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Number Analyzer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #c3cddb;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {

            background: #eba6a6;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
            width: 300px;
        }
        
    </style>
</head>
<body>
    <div class="container">
        <h2>Check Even or Odd</h2>
    
        <label for="numInput">Enter a number:</label><br>
        <input type="number" id="numInput">
        <button onclick="checkNumber()">Submit</button>
    
        <p id="result"></p>
        <p id="list"></p>
    </div>

        
    

    <script src="Midterm1.js"></script>
</body>
</html>
