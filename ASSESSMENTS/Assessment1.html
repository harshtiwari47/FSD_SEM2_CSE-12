<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="Assessment1.css">
</head>
<body>
    <div class="container">

        <h2>Student Marks System</h2>

        <input type="text" id="name" placeholder="Student Name">
        <input type="text" id="roll" placeholder="Roll Number">

        <input type="number" id="math" placeholder="Math Marks">
        <input type="number" id="science" placeholder="Science Marks">
        <input type="number" id="english" placeholder="English Marks">

        <br>

        <button onclick="addStudent()">Add Student</button>

        <hr>

        <button onclick="displayStudents()"> Display All Students </button>
        <button onclick="showTotals()"> Calculate Total </button>
        <button onclick="showAverage()"> Calculate Average </button>
        <button onclick="topStudents()"> Average Above 80.0 </button>
        <button onclick="failedStudents()"> Failed Students </button>
        <button onclick="countStudents()"> Count Students </button>

        <div id="output"></div>

    </div>

    <script src="Assessment1.js"></script>
</body>
</html>
