<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
      rel="stylesheet"
    />
    <title>CALCULATOR</title>

    <style>
      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        text-align: center;
        margin-top: 50px;
      }
      
      input {
        font-family: "Plus Jakarta Sans", sans-serif;
        padding: 8px;
        margin: 5px;
        width: 150px;
        border: 0;
        border-radius: .5rem;
        background: rgb(211, 215, 220);
      }
      
      button {
        padding: 8px 20px;
        font-family: "Plus Jakarta Sans", sans-serif;
        background-color: #007bff;
        color: white;
        border: none;
        cursor: pointer;
        font-weight: 900;
        border-radius: .5rem;
        letter-spacing: .5px;
      }

      button:hover {
        background-color: #0056b3;
      }

      #result {
        margin-top: 20px;
        font-size: 18px;
      }
    </style>
  </head>
  <body>
    <h1>Calculator</h1>

    <input type="number" id="num1" placeholder="Enter first number" />
    <input type="number" id="num2" placeholder="Enter second number" />

    <button onclick="calculate()">Calculate</button>

    <h3 id="result"></h3>

    <script>
      function calculate() {
        let a = Number(document.getElementById("num1").value);
        let b = Number(document.getElementById("num2").value);

        let sum = a + b;
        let diff = a - b;
        let product = a * b;

        document.getElementById("result").innerHTML =
          "Sum: " +
          sum +
          "<br>" +
          "Difference: " +
          diff +
          "<br>" +
          "Product: " +
          product;
      }
    </script>
  </body>
</html>
